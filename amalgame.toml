[package]
name              = "amalgame-net-grpc"
version           = "0.7.0"
license           = "Apache-2.0"
description       = "gRPC server core for the Mosaic stack ‚Äî transport-agnostic message framing (length-prefixed), status codes, method-path routing and unary request dispatch, binary-safe on List<int>. Composes amalgame-formats-protobuf (message codec). v0.2.0: GrpcServer.ServeH2c(port) serves real gRPC over HTTP/2 cleartext end-to-end ‚Äî accept, read :path + binary-safe framed body, dispatch, and answer via net-http v0.22.0 RespondGrpc (grpc-status/grpc-message TRAILERS). Proven end-to-end: a compiled Amalgame server answers a real nghttp2 client over TCP (status 200 + application/grpc + grpc-status 0 + framed echo byte-exact). v0.1.0: transport-agnostic core (framing, status, path, dispatch). v0.3.0: a unary gRPC CLIENT ‚Äî GrpcClient.Dial(host,port).Call(path, message) over net-http v0.23.0's H2Client; proven end-to-end (an Amalgame client ‚Üî an Amalgame ServeH2c server over TCP, echo incl. NUL + grpc-status). v0.2.1: typed service stubs from .proto service{} blocks. v0.4.0: SERVER STREAMING ‚Äî GrpcServer.RegisterStream(path, handler‚ÜíGrpcStreamReply) sends N reply frames before the trailer; GrpcClient.CallStream(path, msg) collects them all. Proven e2e (AM client ‚Üî AM server, 3 messages binary-safe). v0.4.1: grpcurl interop integrated into the test suite + CI ‚Äî the reference gRPC client (grpcurl) calls a typed Greeter server and gets {"message":"Hello, Ada"}, proving real gRPC-standard interop. v0.4.2: generated typed client stubs (proto-gen <Name>Client) ‚Äî typed e2e GreeterClient.SayHello ‚Üî GreeterService in the suite. v0.4.3: typed server-streaming codegen end-to-end ‚Äî GreeterClient.SayHellos‚ÜíList<HelloReply> ‚Üî OnSayHellos in the suite. v0.5.0: gRPC over TLS ‚Äî GrpcServer.ServeHttps(port, certFile, keyFile) serves HTTP/2 with ALPN h2 + OpenSSL termination (same dispatch as ServeH2c). Validated by grpcurl over TLS. v0.6.0: gRPC CLIENT over TLS ‚Äî GrpcClient.DialTls(host,port,insecure) (net-http v0.24.0 H2Client.ConnectTls); typed TLS e2e GreeterClient.DialTls ‚Üî ServeHttps (unary + streaming). v0.7.0: CLIENT-streaming + BIDI (collect model) ‚Äî RegisterClientStream/RegisterBidi (handler gets every request message via GrpcRequests) + GrpcClient.CallClientStream/CallBidi. All four gRPC method types now work on the wire (streaming is buffered collect-then-send, not incrementally flushed). Remaining: true incremental flush, reflection."
required-amalgame = ">=0.8.58"
schema-version    = 1

[stdlib]
classes   = ["GrpcStatus", "GrpcFrame", "GrpcFrameReader", "GrpcPath", "GrpcReply", "GrpcMethod", "GrpcServer"]
header    = "runtime/Amalgame_Net_Grpc.h"
namespace = "Amalgame.Net.Grpc"
facade    = "facade.am"
libs      = []

[dependencies]
amalgame-formats-protobuf = ">=0.1.0"
amalgame-net-http        = ">=0.24.0"
