name: CI
on:
  push: { branches: [main], tags: ['v*'] }
  pull_request: { branches: [main] }
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    strategy: { matrix: { amc-tag: [v0.8.74] } }
    steps:
      - uses: actions/checkout@v4
        with: { path: grpc }
      # GrpcServer.ServeH2c imports Amalgame.Net.Http; the runner stages a
      # fake package cache from these siblings.
      - uses: actions/checkout@v4
        with: { repository: amalgame-lang/amalgame-net-http, ref: v0.24.0, path: amalgame-net-http }
      - uses: actions/checkout@v4
        with: { repository: amalgame-lang/amalgame-tls, ref: v0.3.3, path: amalgame-tls }
      - uses: actions/checkout@v4
        with: { repository: amalgame-lang/amalgame-async, ref: v0.2.2, path: amalgame-async }
      - uses: actions/checkout@v4
        with: { repository: amalgame-lang/amalgame-formats-protobuf, ref: v0.2.4, path: amalgame-formats-protobuf }
      - name: Install system deps
        run: sudo apt-get update -qq && sudo apt-get install -y libgc-dev libssl-dev libnghttp2-dev
      - name: Install grpcurl (reference gRPC client for the interop test)
        run: |
          set -e
          GV=1.9.1
          curl -sSL -o /tmp/grpcurl.tgz "https://github.com/fullstorydev/grpcurl/releases/download/v${GV}/grpcurl_${GV}_linux_x86_64.tar.gz"
          tar -xzf /tmp/grpcurl.tgz -C /tmp grpcurl
          chmod +x /tmp/grpcurl
          echo "GRPCURL=/tmp/grpcurl" >> $GITHUB_ENV
      - name: Download amc ${{ matrix.amc-tag }}
        run: |
          set -e
          TAG="${{ matrix.amc-tag }}"; VERSION="${TAG#v}"
          curl -sSL -o amc.tar.gz "https://github.com/amalgame-lang/Amalgame/releases/download/${TAG}/amc-${VERSION}-linux-x86_64.tar.gz"
          mkdir -p $RUNNER_TEMP/amc && tar -xzf amc.tar.gz -C $RUNNER_TEMP/amc --strip-components=1
          echo "AMC=$RUNNER_TEMP/amc/bin/amc" >> $GITHUB_ENV
          echo "AMC_RUNTIME=$RUNNER_TEMP/amc/share/amalgame/runtime" >> $GITHUB_ENV
      - name: Run tests
        working-directory: grpc
        env:
          AMALGAME_NET_HTTP: ${{ github.workspace }}/amalgame-net-http
          AMALGAME_TLS:      ${{ github.workspace }}/amalgame-tls
          AMALGAME_ASYNC:    ${{ github.workspace }}/amalgame-async
          AMALGAME_FORMATS_PROTOBUF: ${{ github.workspace }}/amalgame-formats-protobuf
          GRPCURL: ${{ env.GRPCURL }}
        run: ./tests/run_tests.sh "$AMC"
